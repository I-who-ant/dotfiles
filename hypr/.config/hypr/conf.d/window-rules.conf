##############################
### 窗口与工作区规则 ###
##############################

# 窗口规则: 抑制所有应用发来的最大化请求 (让 Hyprland 自己来管理窗口大小)
windowrule = match:class .*, suppress_event maximize

# 窗口规则: 修复部分 XWayland 应用 (如一些 Java 程序) 的拖动问题
windowrule {
  name = fix-xwayland-drag
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false

  no_focus = on
}

# Live Captions 浮动并固定到工作区 1
windowrule = match:class net.sapples.LiveCaptions, workspace 1 silent
windowrule = match:class net.sapples.LiveCaptions, float on

# 聊天应用固定到工作区 4
windowrule = match:class QQ, workspace 4 silent
windowrule = match:class org.telegram.desktop, workspace 4 silent
windowrule = match:class WeChat, workspace 4 silent
windowrule = match:class wechat, workspace 4 silent
windowrule = match:title 微信, workspace 4 silent

# Obsidian 固定到工作区 3
windowrule = match:class obsidian, workspace 3 silent

# gf2 固定到工作区 6
windowrule = match:title gf2, workspace 6  
# OBS Studio 固定到工作区 8
windowrule = match:class com.obsproject.Studio, workspace 8 silent

# 常用应用窗口规则
# Zenity 对话框浮动显示
windowrule = match:class zenity, float on
windowrule = match:class zenity, center on
windowrule = match:class zenity, stay_focused on
windowrule = match:class zenity, pin on

# 文件选择器浮动
windowrule = match:class xdg-desktop-portal-gtk, float on
windowrule = match:class xdg-desktop-portal-gtk, size 900 600

# Dolphin 文件操作窗口浮动并居中
windowrule = match:class org.kde.dolphin, match:title (Copying|Moving), float on
windowrule = match:class org.kde.dolphin, match:title (Copying|Moving), center on

# 音量控制窗口浮动
windowrule = match:class pavucontrol, float on
windowrule = match:class pavucontrol, size 800 600
windowrule = match:class pavucontrol, center on

# 图片查看器浮动
windowrule = match:class (org.gnome.eog|imv|feh), float on

# 计算器浮动
windowrule = match:class (org.kde.kcalc|gnome-calculator), float on
windowrule = match:class (org.kde.kcalc|gnome-calculator), size 400 500

# Rofi/Wofi 启动器规则
windowrule = match:class (Rofi|wofi), float on
windowrule = match:class (Rofi|wofi), stay_focused on

# Firefox 画中画浮动并固定
windowrule = match:class firefox, match:title Picture-in-Picture, float on
windowrule = match:class firefox, match:title Picture-in-Picture, pin on
windowrule = match:class firefox, match:title Picture-in-Picture, size 640 360

# 应用工作区绑定
windowrule = match:class microsoft-edge, workspace 1
windowrule = match:class jetbrains-pycharm, workspace 2
windowrule = match:class com.mitchellh.ghostty, workspace 5
