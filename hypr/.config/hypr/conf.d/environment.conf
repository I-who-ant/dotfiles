#############################
### 环境变量 ###
#############################
# 设置会话所需的环境变量, 如光标大小、输入法等
# 以下输入法相关变量移植自您之前的配置，对中文输入至关重要。
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XIM,fcitx5
env = XIM_PROGRAM,fcitx5
env = INPUT_METHOD,fcitx5
env = SUDO_ASKPASS,/home/seeback/.local/bin/sudo-askpass-kde
# Wayland 输入法配置说明：
# - 理想：不设置 GTK_IM_MODULE，让 GTK3/4 使用 Wayland 原生协议（text-input-v3）
# - 现实：Electron 应用需要环境变量才能工作（框架问题）
# - 方案：设置环境变量兼容 Electron，GTK 配置文件（优先级更高）会让原生应用使用 Wayland 协议
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx

# Wayland 输入法支持
env = GLFW_IM_MODULE,ibus

# Wayland 原生支持
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Electron 应用
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Firefox
env = MOZ_ENABLE_WAYLAND,1

# Java 应用修复
env = _JAVA_AWT_WM_NONREPARENTING,1

# XDG 规范
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# 字体渲染优化（改善非整数缩放下的字体清晰度）
env = GDK_DPI_SCALE,1.0
env = FREETYPE_PROPERTIES,truetype:interpreter-version=40

# 禁用客户端装饰（某些应用可能更清晰）
# env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1


