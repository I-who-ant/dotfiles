#############
### 输入设备 ###
#############

input {
    kb_layout = us          # 键盘布局
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps  # CapsLock 映射为 Ctrl
    kb_rules =

    follow_mouse = 1        # 鼠标指针切换窗口焦点的方式
    sensitivity = 0         # 鼠标灵敏度 (-1.0 到 1.0, 0 为不修改)
    accel_profile = adaptive # 鼠标加速配置：adaptive（自适应） 或 flat（线性）
    force_no_accel = false  # 是否强制禁用鼠标加速
    numlock_by_default = true # 默认启用 NumLock（修复虚拟键盘状态不同步问题）

    touchpad {
        natural_scroll = true        # 自然滚动（推荐开启）
        tap-to-click = true          # 轻触触摸板等于点击
        drag_lock = false            # 拖拽锁定
        disable_while_typing = true  # 打字时禁用触摸板
        scroll_factor = 1.0          # 滚动速度倍数
        middle_button_emulation = false # 双指点击模拟中键
        clickfinger_behavior = true  # 双指点击=右键，三指点击=中键
    }
}

# 手势配置（如果你的设备支持触摸板手势，可以取消注释）
# gestures {
#     workspace_swipe = true
# }

# 针对特定设备的配置示例
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# 触摸板设备配置
device {
    name = syna2ba6:00-06cb:cefe-touchpad
    enabled = true
}
