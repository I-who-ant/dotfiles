###################
### 快捷键绑定 ###
###################

$mainMod = SUPER # 设置 Super 键 (Win键) 为主修饰键

# 您的个性化及优化后的快捷键
bind = $mainMod, R, exec, $terminal        # Super + R: 打开终端
bind = $mainMod, Q, killactive,            # Super + Q: 关闭当前活跃窗口
bind = ALT, F4, killactive,                # Alt + F4: 关闭当前活跃窗口
bind = $mainMod, E, exec, $fileManager     # Super + E: 打开文件管理器
bind = ALT, SPACE, exec, $menu             # Alt + Space: 打开程序启动器
bind = ALT, TAB, exec, snappy-switcher next
bind = ALT SHIFT, TAB, exec, snappy-switcher prev
bind = $mainMod, TAB, exec, rofi -show window -theme ~/.config/rofi/current/window-switcher.rasi  # Super + Tab: 窗口切换器
bind = $mainMod SHIFT, E, exec, ~/.local/bin/rofi-file-finder  # Super + Shift + E: 文件查找器
bind = $mainMod, SPACE, togglefloating,    # Super + Space: 切换窗口浮动状态
bind = $mainMod SHIFT, F, fullscreen, 0    # Super + Shift + F: 切换窗口全屏

# Emacs 风格窗口焦点移动
bind = $mainMod, F, movefocus, r           # Super + F: 向右移动焦点 (forward)
bind = $mainMod, B, movefocus, l           # Super + B: 向左移动焦点 (backward)
bind = $mainMod, N, movefocus, d           # Super + N: 向下移动焦点 (next)
bind = $mainMod, P, movefocus, u           # Super + P: 向上移动焦点 (previous)

# 您的个性化剪贴板历史快捷键
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "剪贴板历史" -theme ~/.config/rofi/current/window-switcher.rasi | cliphist decode | wl-copy

# Rofi 主题集合快捷键
bind = $mainMod, X, exec, $powermenu                                    # Super + X: 电源菜单
bind = $mainMod SHIFT, S, exec, ~/.config/rofi/applets/bin/screenshot.sh  # Super + Shift + S: 截图工具
bind = $mainMod SHIFT, V, exec, ~/.config/rofi/applets/bin/volume.sh      # Super + Shift + V: 音量控制

# Dwindle 布局专用快捷键
bind = $mainMod, J, layoutmsg, togglesplit  # Super + J: 切换伪平铺模式下的分割方向

# 移动焦点
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# 切换工作区
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10 # 将 Super + 0 映射到第10个工作区，比映射到0更符合直觉

# 移动当前窗口到指定工作区
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# 隐藏区：将窗口送入隐藏区，并通过同一快捷键显示/隐藏
bind = $mainMod, S, togglespecialworkspace, hidden
bind = $mainMod, H, movetoworkspacesilent, special:hidden

# 使用鼠标滚轮切换工作区
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# 使用鼠标侧键切换工作区
bind = , mouse:275, workspace, e+1  # 鼠标侧键后退: 下一个工作区
bind = , mouse:276, workspace, e-1  # 鼠标侧键前进: 上一个工作区

# 使用 Super + 鼠标左/右键拖动/调整窗口大小
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow  # Super + Shift + 左键(触控板单指): 调整窗口大小

# 系统控制快捷键
bind = $mainMod, L, exec, hyprlock                           # Super + L: 锁屏
bind = $mainMod, U, exec, $powermenu  # Super + U: 电源菜单（rofi）

# 截图功能（使用 Satty 进行标注编辑）
bind = , F1, exec, grim -g "$(slurp)" - | satty --filename - --fullscreen --output-filename ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S.png')  # F1: 选区截图+编辑
bind = SHIFT, F1, exec, grim - | satty --filename - --fullscreen --output-filename ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S.png')           # Shift+F1: 全屏截图+编辑
bind = CTRL, F1, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | satty --filename - --fullscreen --output-filename ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S.png')  # Ctrl+F1: 窗口截图+编辑

# 录屏功能（使用 wf-recorder）
bind = $mainMod, Print, exec, ~/.local/bin/launch-obs  # Super+Print: 开始/停止录屏

# 窗口移动（Vim 风格）
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# 窗口移动（Emacs 风格）
bind = $mainMod CTRL, F, layoutmsg, swapcol r
bind = $mainMod CTRL, B, layoutmsg, swapcol l
bind = $mainMod CTRL, N, movewindow, d
bind = $mainMod CTRL, P, movewindow, u

# 窗口大小调整（Vim 风格）
bind = $mainMod CTRL, h, layoutmsg, colresize -0.05
bind = $mainMod CTRL, l, layoutmsg, colresize +0.05
bind = $mainMod CTRL, k, layoutmsg, colresize -0.05
bind = $mainMod CTRL, j, layoutmsg, colresize +0.05

# 窗口大小调整（Emacs 风格）
binde = $mainMod CTRL, equal, layoutmsg, colresize +0.05
binde = $mainMod CTRL, minus, layoutmsg, colresize -0.05

# 窗口分组（标签页功能）
bind = $mainMod, G, togglegroup
bind = $mainMod ALT, TAB, changegroupactive, f
bind = $mainMod ALT SHIFT, TAB, changegroupactive, b

# 窗口居中
bind = $mainMod SHIFT, C, centerwindow

# Pin 窗口（固定在所有工作区显示）
bind = $mainMod, O, pin

# 切换平铺/浮动
bind = $mainMod, T, togglefloating

# 触摸板开关
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/toggle-touchpad.sh "syna2ba6:00-06cb:cefe-touchpad"

# 旧的“最小化工作区”方案已移除，统一使用隐藏区

# 重载配置
bind = $mainMod SHIFT, R, exec, hyprctl reload

# 快速启动应用
bind = $mainMod CTRL, T, exec, ghostty --title=floating
bind = $mainMod CTRL, W, exec, firefox
bind = $mainMod CTRL, E, exec, nautilus

# 多媒体按键 (音量, 亮度, 播放控制)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
