# Dwindle 布局设置
# Scrolling 布局设置（滚动式平铺）
scrolling {
    fullscreen_on_one_column = true  # 单列时全屏显示（100%）
    column_width = 0.8                # 默认列宽（0.8 = 80%），新窗口会露出 20%
    focus_fit_method = 1              # 聚焦方式：0=居中，1=适应
    follow_focus = true               # 自动跟随焦点
    follow_min_visible = 0.3          # 最小可见比例（降低以便看到更多窗口边缘）
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0  # 预设列宽
    direction = right                 # 滚动方向：right/left/down/up
}

dwindle {
    preserve_split = true   # 保持窗口分割比例
}

# Master 布局设置
master {
    new_status = master
}
