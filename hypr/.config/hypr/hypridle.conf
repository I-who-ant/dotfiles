general {
    lock_cmd = pidof hyprlock || hyprlock       # 避免重复启动锁屏
    before_sleep_cmd = loginctl lock-session    # 休眠前锁屏
    after_sleep_cmd = hyprctl dispatch dpms on  # 唤醒后开启显示器
}

# 5分钟后降低亮度到10%
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10        # 保存当前亮度并设为10%
    on-resume = brightnessctl -r                # 恢复之前的亮度
}

# 10分钟后锁屏
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 15分钟后关闭显示器
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

