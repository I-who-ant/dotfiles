# hyprsunset 配置文件
# 蓝光过滤器和亮度调节

# 最大 gamma 值（100% = 正常亮度）
max-gamma = 100%

# 白天配置（7:30 开始）
profile {
    time = 7:30
    identity = true  # 正常显示，无过滤
}

# 晚上配置（21:00 开始）
profile {
    time = 21:00
    temperature = 5500  # 轻微暖色调
    gamma = 1.0         # 保持正常亮度
}

# 深夜配置（23:00 开始）
profile {
    time = 23:00
    temperature = 4500  # 稍暖的色调
    gamma = 0.95        # 稍微降低亮度
}
