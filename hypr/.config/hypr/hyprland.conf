# #######################################################################################
# Hyprland 配置文件 - 终极整合版
# 基于最新的 Hyprland 语法，并整合了您之前的个性化配置。
# #######################################################################################

# 查阅 Hyprland Wiki 获取所有可用选项的详细信息: https://wiki.hypr.land/Configuring/

# 您可以将配置拆分到多个文件中，像这样引入:
# source = ~/.config/hypr/myColors.conf

source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/variables.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/environment.conf
source = ~/.config/hypr/conf.d/appearance.conf
source = ~/.config/hypr/conf.d/layouts.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/keybindings.conf
source = ~/.config/hypr/conf.d/window-rules.conf
