# Dark theme with Maple Mono NF CN font

$fontFamily = Maple Mono NF CN

# GENERAL
general {
    no_fade_in = false
    grace = 3
    disable_loading_bar = false
}

# BACKGROUND - Dark theme
background {
    monitor =
    path = ~/Pictures/wallpaper.png
    blur_size = 6
    blur_passes = 3
    noise = 0.0117
    contrast = 0.9000
    brightness = 0.5000      # Darker background
    vibrancy = 0.1500
    vibrancy_darkness = 0.2
}

# TIME - Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = rgba(200, 200, 220, 1.0)  # Light gray-blue
    font_size = 180
    font_family = $fontFamily Medium
    position = 0, 80
    halign = center
    valign = center
}

# TIME - Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgba(150, 150, 180, 1.0)  # Slightly darker
    font_size = 180
    font_family = $fontFamily Medium
    position = 0, -120
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "<b> $(date +"%d %b") </b>"
    color = rgba(180, 180, 200, 0.9)
    font_size = 24
    font_family = $fontFamily
    position = 0, -240
    halign = center
    valign = center
}

# DAY OF WEEK
label {
    monitor =
    text = cmd[update:1000] echo "<b> $(date +"%A") </b>"
    color = rgba(160, 160, 180, 0.8)
    font_size = 20
    font_family = $fontFamily
    position = 0, -270
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.8
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(80, 80, 100, 0.8)   # Dark gray border
    inner_color = rgba(30, 30, 40, 0.9)    # Very dark background
    font_color = rgba(220, 220, 240, 1.0)  # Light text
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>输入密码...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(100, 150, 200, 0.8)
    fail_color = rgba(200, 80, 80, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, 60
    halign = center
    valign = bottom
}

# USER GREETING
label {
    monitor =
    text = cmd[update:60000] echo "Welcome, $USER"
    color = rgba(180, 180, 200, 0.9)
    font_size = 18
    font_family = $fontFamily
    position = 0, 10
    halign = center
    valign = bottom
}

# BATTERY STATUS
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = rgba(150, 150, 170, 0.8)
    font_size = 18
    font_family = $fontFamily
    position = -1%, 1%
    halign = right
    valign = bottom
}

# KEYBOARD LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = rgba(150, 150, 170, 0.8)
    font_size = 18
    font_family = $fontFamily
    position = -2.5%, 1%
    halign = right
    valign = bottom
}
