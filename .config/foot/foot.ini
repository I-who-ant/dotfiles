# -*- conf -*-

# 基本设置
shell=$SHELL
term=foot
login-shell=no

# 字体配置
font=monospace:size=11
line-height=1.2
letter-spacing=0
dpi-aware=yes

# 窗口设置
initial-window-size-chars=100x30
initial-window-mode=windowed
pad=8x8
resize-by-cells=yes

# 滚动设置
[scrollback]
lines=10000
multiplier=3.0

# URL 处理
[url]
launch=xdg-open ${url}
osc8-underline=url-mode

# 光标设置
[cursor]
style=block
blink=yes
blink-rate=500

# 鼠标设置
[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

# 配色方案 (暗色主题)
[colors]
alpha=0.95
background=1e1e2e
foreground=cdd6f4

## 普通颜色
regular0=45475a  # black
regular1=f38ba8  # red
regular2=a6e3a1  # green
regular3=f9e2af  # yellow
regular4=89b4fa  # blue
regular5=f5c2e7  # magenta
regular6=94e2d5  # cyan
regular7=bac2de  # white

## 高亮颜色
bright0=585b70   # bright black
bright1=f38ba8   # bright red
bright2=a6e3a1   # bright green
bright3=f9e2af   # bright yellow
bright4=89b4fa   # bright blue
bright5=f5c2e7   # bright magenta
bright6=94e2d5   # bright cyan
bright7=a6adc8   # bright white

## 其他颜色
selection-foreground=cdd6f4
selection-background=45475a
urls=89b4fa

# 按键绑定
[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0
spawn-terminal=Control+Shift+n
show-urls-launch=Control+Shift+o

