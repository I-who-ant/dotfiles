# Hyprlauncher 配置文件
# 官方文档: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlauncher/

general {
    grab_focus = true  # 强制键盘焦点抓取
}

cache {
    enabled = true  # 启用缓存（记录常用应用）
}

finders {
    # 默认启动器模式
    default_finder = desktop

    # 各模块前缀
    desktop_prefix =   # 桌面应用（默认，无前缀）
    math_prefix = =    # 数学计算器（输入 =2+2 计算）
    unicode_prefix = . # Unicode 符号（输入 .smile 搜索表情）
    font_prefix = '    # 字体浏览（输入 'mono 搜索等宽字体）

    # 桌面应用设置
    desktop_launch_prefix =  # 应用启动前缀（留空）
    desktop_icons = true     # 显示应用图标
}

ui {
    window_size = 500 350  # 窗口大小（宽 高）
}

# 使用说明：
# - Super+P 打开启动器
# - 直接输入应用名搜索
# - 输入 =2+2 进行数学计算
# - 输入 .smile 搜索 Unicode 符号
# - 输入 'mono 搜索字体
